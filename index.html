<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVT-B 任務</title>

<style>
body {
  font-family: Arial, "Microsoft JhengHei", sans-serif;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
}

#container {
  max-width: 850px;
  margin: 40px auto;
  padding: 30px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
}

#box {
  width: 260px;
  height: 260px;
  margin: 70px auto;
  background: #c93434;
  border-radius: 20px;
  color: white;
  font-size: 42px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

button {
  font-size: 20px;
  padding: 10px 24px;
  margin: 8px;
}

input {
  font-size: 18px;
  padding: 6px;
  width: 120px;
}

#countdown {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
  color: #333;
}

#status {
  font-size: 20px;
  min-height: 32px;
}

#summary {
  font-size: 20px;
  line-height: 1.8;
}

#hint {
  color: #666;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="container">
  <h2>PVT-B 反應時間任務</h2>

  <p>等待藍色刺激出現後，盡快點擊畫面或觸碰螢幕。</p>
  <p>任務進行中可按 <strong>P</strong> 暫停或繼續。</p>

  <label for="subjectId">受試者編號</label>
  <input id="subjectId" value="S01" type="text">

  <br><br>

  <label for="time">任務時間（分鐘）</label>
  <input id="time" value="15" type="number" min="1">

  <br><br>

  <button id="startBtn" onclick="startTask()">開始任務</button>
  <button id="pauseBtn" onclick="togglePause()" disabled>暫停</button>

  <div id="countdown">剩餘時間：15:00</div>

  <div id="box">等待開始</div>

  <p id="status"></p>
  <p id="hint">滑鼠點擊、觸控，或按空白鍵都可回應刺激。</p>
  <div id="summary"></div>
</div>

<script>
let running = false;
let paused = false;
let taskStartTime = 0;
let taskDuration = 0;
let pausedTotalMs = 0;
let pauseStartedAt = 0;

let trial = 0;
let data = [];

let waitStartTime = null;
let stimTime = null;
let waitingForStimulus = false;

let timeoutId = null;
let timeoutStartedAt = 0;
let timeoutDurationMs = 0;
let timeoutRemainingMs = 0;
let timeoutCallback = null;
let countdownTimer = null;

const MIN_WAIT_MS = 2000;
const MAX_WAIT_MS = 10000;
const FEEDBACK_MS = 1000;
const LAPSE_THRESHOLD_MS = 500;

function randomWait() {
  return Math.floor(Math.random() * (MAX_WAIT_MS - MIN_WAIT_MS + 1)) + MIN_WAIT_MS;
}

function setManagedTimeout(callback, durationMs) {
  clearManagedTimeout();
  timeoutCallback = callback;
  timeoutDurationMs = durationMs;
  timeoutRemainingMs = durationMs;
  timeoutStartedAt = performance.now();
  timeoutId = setTimeout(() => {
    clearManagedTimeout();
    callback();
  }, durationMs);
}

function clearManagedTimeout() {
  if (timeoutId !== null) {
    clearTimeout(timeoutId);
  }
  timeoutId = null;
  timeoutStartedAt = 0;
  timeoutDurationMs = 0;
  timeoutRemainingMs = 0;
  timeoutCallback = null;
}

function formatDuration(ms) {
  const totalSeconds = Math.ceil(Math.max(0, ms) / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
}

function elapsedTaskMs() {
  if (!running) return 0;
  const now = paused ? pauseStartedAt : performance.now();
  return now - taskStartTime - pausedTotalMs;
}

function remainingTaskMs() {
  return Math.max(0, taskDuration - elapsedTaskMs());
}

function updateCountdown() {
  document.getElementById("countdown").textContent = "剩餘時間：" + formatDuration(remainingTaskMs());
}

function startTask() {
  const minutes = Number(document.getElementById("time").value);
  if (!Number.isFinite(minutes) || minutes <= 0) {
    alert("請輸入大於 0 的分鐘數。");
    return;
  }

  running = true;
  paused = false;
  pausedTotalMs = 0;
  pauseStartedAt = 0;
  trial = 0;
  data = [];
  waitStartTime = null;
  stimTime = null;
  waitingForStimulus = false;

  taskDuration = minutes * 60 * 1000;
  taskStartTime = performance.now();

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("pauseBtn").disabled = false;
  document.getElementById("pauseBtn").textContent = "暫停";
  document.getElementById("summary").innerHTML = "";
  document.getElementById("status").textContent = "";

  updateCountdown();
  startCountdown();
  nextTrial();
}

function startCountdown() {
  if (countdownTimer !== null) {
    clearInterval(countdownTimer);
  }

  countdownTimer = setInterval(() => {
    updateCountdown();
    if (running && !paused && remainingTaskMs() <= 0) {
      finishTask();
    }
  }, 250);
}

function nextTrial() {
  if (!running || paused) return;

  if (remainingTaskMs() <= 0) {
    finishTask();
    return;
  }

  trial += 1;
  stimTime = null;
  waitingForStimulus = true;
  waitStartTime = performance.now();

  const box = document.getElementById("box");
  box.style.background = "#c93434";
  box.textContent = "等待中";
  document.getElementById("status").textContent = "請等待刺激出現";

  setManagedTimeout(() => {
    if (!running || paused) return;

    stimTime = performance.now();
    waitingForStimulus = false;
    box.style.background = "#2d6cdf";
    box.textContent = "現在點擊";
    document.getElementById("status").textContent = "請立刻反應";
  }, randomWait());
}

function scheduleNextTrial(delayMs) {
  setManagedTimeout(() => {
    nextTrial();
  }, delayMs);
}

function handleResponse() {
  if (!running || paused) return;

  const now = performance.now();
  const subjectId = document.getElementById("subjectId").value || "subject";

  if (waitingForStimulus) {
    clearManagedTimeout();

    data.push({
      subject_id: subjectId,
      trial: trial,
      wait_ms: "",
      rt_ms: "",
      response_type: "false_start",
      correct: 0,
      lapse: 0,
      timestamp_ms: Math.round(now)
    });

    const box = document.getElementById("box");
    box.style.background = "#444";
    box.textContent = "太早了";
    document.getElementById("status").textContent = "這次屬於過早反應";

    scheduleNextTrial(FEEDBACK_MS);
    return;
  }

  if (stimTime !== null) {
    const rt = Math.round(now - stimTime);
    const waitMs = Math.round(stimTime - waitStartTime);
    const lapse = rt >= LAPSE_THRESHOLD_MS ? 1 : 0;

    data.push({
      subject_id: subjectId,
      trial: trial,
      wait_ms: waitMs,
      rt_ms: rt,
      response_type: "valid",
      correct: 1,
      lapse: lapse,
      timestamp_ms: Math.round(stimTime)
    });

    const box = document.getElementById("box");
    box.style.background = "#333";
    box.textContent = rt + " ms";
    document.getElementById("status").textContent = "反應時間：" + rt + " ms";

    stimTime = null;
    scheduleNextTrial(FEEDBACK_MS);
  }
}

function togglePause() {
  if (!running) return;

  const pauseBtn = document.getElementById("pauseBtn");
  const box = document.getElementById("box");

  if (!paused) {
    paused = true;
    pauseStartedAt = performance.now();

    if (timeoutId !== null) {
      const elapsed = performance.now() - timeoutStartedAt;
      timeoutRemainingMs = Math.max(0, timeoutDurationMs - elapsed);
      clearTimeout(timeoutId);
      timeoutId = null;
    }

    box.style.background = "#666";
    box.textContent = "已暫停";
    document.getElementById("status").textContent = "按 P 或按鈕繼續";
    pauseBtn.textContent = "繼續";
    return;
  }

  paused = false;
  pausedTotalMs += performance.now() - pauseStartedAt;
  pauseStartedAt = 0;
  pauseBtn.textContent = "暫停";

  if (timeoutCallback && timeoutRemainingMs > 0) {
    const resumeCallback = timeoutCallback;
    const remainingMs = timeoutRemainingMs;
    timeoutId = setTimeout(() => {
      clearManagedTimeout();
      resumeCallback();
    }, remainingMs);
    timeoutStartedAt = performance.now();
    timeoutDurationMs = remainingMs;
  } else if (stimTime !== null) {
    box.style.background = "#2d6cdf";
    box.textContent = "現在點擊";
    document.getElementById("status").textContent = "請立刻反應";
  } else {
    box.style.background = "#c93434";
    box.textContent = "等待中";
    document.getElementById("status").textContent = "請等待刺激出現";
  }
}

function finishTask() {
  running = false;
  paused = false;
  clearManagedTimeout();

  if (countdownTimer !== null) {
    clearInterval(countdownTimer);
    countdownTimer = null;
  }

  document.getElementById("box").style.background = "#222";
  document.getElementById("box").textContent = "已完成";
  document.getElementById("countdown").textContent = "剩餘時間：00:00";
  document.getElementById("status").textContent = "";
  document.getElementById("pauseBtn").disabled = true;

  document.getElementById("summary").innerHTML =
    "<button onclick='downloadCSV()'>下載 CSV</button>";
}

function downloadCSV() {
  const header = [
    "subject_id",
    "trial",
    "wait_ms",
    "rt_ms",
    "response_type",
    "correct",
    "lapse",
    "timestamp_ms"
  ];

  let csv = header.join(",") + "\n";

  data.forEach(d => {
    csv += header.map(h => d[h]).join(",") + "\n";
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const subjectId = document.getElementById("subjectId").value || "subject";

  const a = document.createElement("a");
  a.href = url;
  a.download = subjectId + "_pvt_result.csv";
  a.click();

  URL.revokeObjectURL(url);
}

document.addEventListener("click", function(event) {
  if (event.target.tagName === "BUTTON") return;
  handleResponse();
});

document.addEventListener("touchstart", function(event) {
  if (event.target.tagName === "BUTTON") return;
  event.preventDefault();
  handleResponse();
}, { passive: false });

document.addEventListener("keydown", function(event) {
  if (event.key === "p" || event.key === "P") {
    event.preventDefault();
    togglePause();
    return;
  }

  if (event.code === "Space") {
    event.preventDefault();
    handleResponse();
  }
});

updateCountdown();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPT-X 測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg-start: #f3efe2;
      --bg-end: #dce8f1;
      --panel: rgba(255, 255, 255, 0.94);
      --ink: #17212b;
      --muted: #536171;
      --accent: #1f5eff;
      --danger: #c73636;
      --box-bg: #ffffff;
      --shadow: 0 20px 50px rgba(23, 33, 43, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 36%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
    }

    .app {
      width: min(980px, 100%);
      padding: 40px;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 4vw, 3.4rem);
    }

    .instructions {
      margin: 0 auto 24px;
      max-width: 760px;
      padding: 22px 24px;
      border-radius: 20px;
      background: #f8fbff;
      border: 2px solid #dce6f5;
      color: #000;
    }

    .instructions h2 {
      margin: 0 0 14px;
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
    }

    .instructions p {
      margin: 8px 0;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      line-height: 1.8;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 16px 20px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.3rem;
      font-weight: 700;
    }

    input {
      width: 180px;
      padding: 12px 16px;
      border: 2px solid #c8d4e4;
      border-radius: 14px;
      font-size: 1.3rem;
      text-align: center;
      color: var(--ink);
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 15px 28px;
      font-size: 1.35rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .stimulus-box {
      width: min(380px, 78vw);
      aspect-ratio: 1 / 1;
      margin: 0 auto 22px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--box-bg);
      box-shadow: inset 0 0 0 3px #d7dee8;
      user-select: none;
    }

    .stimulus-text {
      font-size: clamp(4.5rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #000;
    }

    .status {
      min-height: 54px;
      margin: 0 0 18px;
      font-size: clamp(1.3rem, 2.6vw, 1.8rem);
      font-weight: 700;
    }

    .status.muted { color: var(--muted); }
    .status.danger { color: var(--danger); }
  </style>
</head>

<body>
  <main class="app">
    <h1>CPT-X 持續性注意力測驗</h1>

    <section class="instructions">
      <h2>操作說明</h2>
      <p>看到字母 <strong>X</strong> 時請按下空白鍵；看到其他字母時請不要按任何鍵。</p>
      <p>SPACE：作答</p>
      <p>P：暫停 / 繼續</p>
      <p>ESC：直接結束測驗並輸出 CSV</p>
    </section>

    <section class="controls">
      <label class="field" for="subjectId">
        受試者編號
        <input id="subjectId" type="text" value="S01">
      </label>

      <label class="field" for="durationMinutes">
        測驗時間（分鐘）
        <input id="durationMinutes" type="number" min="0.1" step="0.1" value="15">
      </label>

      <button id="startBtn" type="button">開始測驗</button>
    </section>

    <div class="stimulus-box">
      <div class="stimulus-text" id="stimulusText"></div>
    </div>

    <p class="status muted" id="status">按下「開始測驗」後，請用空白鍵作答。</p>
  </main>

  <script>
    const LETTERS = ["A", "C", "D", "F", "H", "K", "M", "Q", "X"];
    const TARGET = "X";

    const TARGET_RATIO = 0.15;
    const STIMULUS_DISPLAY_MS = 150;
    const SOA_MIN_MS = 1000;
    const SOA_MAX_MS = 2000;

    let running = false;
    let paused = false;
    let finished = false;
    let trialIndex = 0;
    let results = [];

    let taskStartPerf = 0;
    let taskDurationMs = 0;
    let pausedTaskTotalMs = 0;

    let trialStartPerf = 0;
    let trialStartIso = "";
    let pausedTrialTotalMs = 0;
    let pauseStartedAt = 0;

    let stimulusActive = false;
    let stimulusVisible = false;
    let currentStimulus = "";
    let currentSOA = 0;
    let responseCaptured = false;

    let trialTimeoutId = null;
    let hideStimulusTimeoutId = null;
    let countdownIntervalId = null;
    let nextTrialTimeoutId = null;
    let preStartCountdownId = null;

    let trialTimeoutRemainingMs = 0;
    let trialTimeoutStartedAt = 0;
    let hideStimulusRemainingMs = 0;
    let hideStimulusStartedAt = 0;

    const startBtn = document.getElementById("startBtn");
    const subjectIdInput = document.getElementById("subjectId");
    const durationMinutesInput = document.getElementById("durationMinutes");
    const status = document.getElementById("status");
    const stimulusText = document.getElementById("stimulusText");

    function pickSOA() {
      return SOA_MIN_MS + Math.random() * (SOA_MAX_MS - SOA_MIN_MS);
    }

    function remainingTaskMs() {
      if (!running) return taskDurationMs;
      const now = paused ? pauseStartedAt : performance.now();
      const elapsed = now - taskStartPerf - pausedTaskTotalMs;
      return Math.max(0, taskDurationMs - elapsed);
    }

    function setStatus(text, tone = "muted") {
      status.textContent = text;
      status.className = `status ${tone}`;
    }

    function setBoxState(text) {
      stimulusText.textContent = text;
    }

    function pickStimulus() {
      const nontargets = LETTERS.filter(letter => letter !== TARGET);
      return Math.random() < TARGET_RATIO
        ? TARGET
        : nontargets[Math.floor(Math.random() * nontargets.length)];
    }

    function resetTrialTimer() {
      if (trialTimeoutId !== null) clearTimeout(trialTimeoutId);
      trialTimeoutId = null;
    }

    function startTrialTimer(durationMs) {
      resetTrialTimer();
      trialTimeoutRemainingMs = durationMs;
      trialTimeoutStartedAt = performance.now();
      trialTimeoutId = setTimeout(finalizeCurrentTrial, durationMs);
    }

    function resetHideStimulusTimer() {
      if (hideStimulusTimeoutId !== null) clearTimeout(hideStimulusTimeoutId);
      hideStimulusTimeoutId = null;
    }

    function hideCurrentStimulus() {
      stimulusVisible = false;
      setBoxState("");
      resetHideStimulusTimer();
    }

    function startHideStimulusTimer(durationMs) {
      resetHideStimulusTimer();
      hideStimulusRemainingMs = durationMs;
      hideStimulusStartedAt = performance.now();
      hideStimulusTimeoutId = setTimeout(hideCurrentStimulus, durationMs);
    }

    function resetNextTrialTimer() {
      if (nextTrialTimeoutId !== null) clearTimeout(nextTrialTimeoutId);
      nextTrialTimeoutId = null;
    }

    function stopCountdown() {
      if (countdownIntervalId !== null) clearInterval(countdownIntervalId);
      countdownIntervalId = null;
    }

    function startCountdown() {
      stopCountdown();
      countdownIntervalId = setInterval(() => {
          if (running && !paused && remainingTaskMs() <= 0) finishTask(false);
      }, 250);
    }

    function resetPreStartCountdown() {
      if (preStartCountdownId !== null) clearTimeout(preStartCountdownId);
      preStartCountdownId = null;
    }

    function beginTaskAfterCountdown(secondsLeft) {
      if (!running || finished) return;

      if (secondsLeft > 0) {
        setStatus(`請準備，${secondsLeft} 秒後開始。`);
        setBoxState(String(secondsLeft));
        preStartCountdownId = setTimeout(() => beginTaskAfterCountdown(secondsLeft - 1), 1000);
        return;
      }

      resetPreStartCountdown();
      setStatus("開始作答，只有看到 X 才按 SPACE。");
      setBoxState("");
      startCountdown();
      showNextTrial();
    }

    function startTask() {
      const minutes = Number(durationMinutesInput.value);
      if (!Number.isFinite(minutes) || minutes <= 0) {
        alert("請輸入大於 0 的測驗時間。");
        return;
      }

      const confirmed = window.confirm(
        "開始前確認：\n請確認受試者已準備好，測驗期間請專心看著螢幕中央。\n\n按下「確定」後開始測驗。"
      );
      if (!confirmed) return;

      running = true;
      paused = false;
      finished = false;
      trialIndex = 0;
      results = [];

      pausedTaskTotalMs = 0;
      pausedTrialTotalMs = 0;
      pauseStartedAt = 0;

      taskDurationMs = minutes * 60 * 1000;
      taskStartPerf = performance.now();

      startBtn.disabled = true;
      subjectIdInput.disabled = true;
      durationMinutesInput.disabled = true;

      resetPreStartCountdown();
      beginTaskAfterCountdown(3);
    }

    function showNextTrial() {
      if (!running || paused || remainingTaskMs() <= 0) return;

      currentStimulus = pickStimulus();
      currentSOA = pickSOA();
      responseCaptured = false;
      stimulusActive = true;
      stimulusVisible = true;
      pausedTrialTotalMs = 0;
      trialStartPerf = performance.now();
      trialStartIso = new Date().toISOString();
      trialIndex += 1;

      setBoxState(currentStimulus);
      setStatus("只有看到 X 才按 SPACE。");

      const trialDurationMs = Math.min(currentSOA, remainingTaskMs());
      startTrialTimer(trialDurationMs);
      startHideStimulusTimer(Math.min(STIMULUS_DISPLAY_MS, trialDurationMs));
    }

    function finalizeCurrentTrial() {
      if (!running || paused || !stimulusActive) return;

      stimulusActive = false;
      stimulusVisible = false;

      const isTarget = currentStimulus === TARGET;
      let correct = false;
      let errorType = "";
      let rtMs = "";

      if (responseCaptured) {
        rtMs = Number((performance.now() - trialStartPerf - pausedTrialTotalMs).toFixed(2));
      }

      if (isTarget && responseCaptured) {
        correct = true;
        errorType = "hit";
      } else if (isTarget && !responseCaptured) {
        correct = false;
        errorType = "omission";
      } else if (!isTarget && responseCaptured) {
        correct = false;
        errorType = "commission";
      } else {
        correct = true;
        errorType = "correct_rejection";
      }

      const elapsedTaskMs = performance.now() - taskStartPerf - pausedTaskTotalMs;
      const minuteBin = Math.floor(elapsedTaskMs / 60000) + 1;

      results.push({
        trial: trialIndex,
        minute_bin: minuteBin,
        stimulus: currentStimulus,
        is_target: isTarget,
        response: responseCaptured,
        rt_ms: rtMs,
        correct: correct,
        error_type: errorType,
        soa_ms: Number(currentSOA.toFixed(2)),
        paused: pausedTrialTotalMs > 0,
        trial_start_time: trialStartIso
      });

      resetTrialTimer();
      resetHideStimulusTimer();
      resetNextTrialTimer();
      setBoxState("");

      if (remainingTaskMs() <= 0) finishTask(false);
      else nextTrialTimeoutId = setTimeout(showNextTrial, 0);
    }

    function togglePause() {
      if (!running || finished) return;

      if (!paused) {
        paused = true;
        pauseStartedAt = performance.now();
        setStatus("測驗已暫停，再按一次 P 可繼續。");

        if (trialTimeoutId !== null) {
          const elapsed = performance.now() - trialTimeoutStartedAt;
          trialTimeoutRemainingMs = Math.max(0, trialTimeoutRemainingMs - elapsed);
          clearTimeout(trialTimeoutId);
          trialTimeoutId = null;
        }

        if (hideStimulusTimeoutId !== null) {
          const elapsed = performance.now() - hideStimulusStartedAt;
          hideStimulusRemainingMs = Math.max(0, hideStimulusRemainingMs - elapsed);
          clearTimeout(hideStimulusTimeoutId);
          hideStimulusTimeoutId = null;
        }

        resetNextTrialTimer();
          return;
      }

      paused = false;
      const pausedDuration = performance.now() - pauseStartedAt;
      pausedTaskTotalMs += pausedDuration;
      pausedTrialTotalMs += pausedDuration;
      pauseStartedAt = 0;

      if (stimulusActive) {
        setStatus("測驗已繼續。");
        if (trialTimeoutRemainingMs > 0) startTrialTimer(Math.min(trialTimeoutRemainingMs, remainingTaskMs()));
        if (stimulusVisible && hideStimulusRemainingMs > 0) startHideStimulusTimer(Math.min(hideStimulusRemainingMs, remainingTaskMs()));
      } else {
        setStatus("測驗已繼續。");
        nextTrialTimeoutId = setTimeout(showNextTrial, 200);
      }

    }

    function finishTask(triggeredByEsc) {
      if (finished) return;

      running = false;
      paused = false;
      finished = true;
      stimulusActive = false;
      stimulusVisible = false;

      resetTrialTimer();
      resetHideStimulusTimer();
      resetNextTrialTimer();
      resetPreStartCountdown();
      stopCountdown();

      setBoxState("");
      setStatus(triggeredByEsc ? "已依照 ESC 指令結束並下載 CSV。" : "測驗完成，結果已自動下載為 CSV。");

      startBtn.disabled = false;
      subjectIdInput.disabled = false;
      durationMinutesInput.disabled = false;

      downloadCSV();
    }

    function mean(values) {
      if (!values.length) return 0;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function sd(values) {
      if (values.length <= 1) return 0;
      const m = mean(values);
      return Math.sqrt(values.reduce((sum, value) => sum + (value - m) ** 2, 0) / (values.length - 1));
    }

    function calculateSummary() {
      const total = results.length;
      const targets = results.filter(row => row.is_target);
      const nontargets = results.filter(row => !row.is_target);
      const hits = results.filter(row => row.error_type === "hit");
      const omissions = results.filter(row => row.error_type === "omission");
      const commissions = results.filter(row => row.error_type === "commission");
      const correctRejections = results.filter(row => row.error_type === "correct_rejection");
      const rtValues = hits.map(row => Number(row.rt_ms)).filter(value => Number.isFinite(value));
      const firstHalf = results.slice(0, Math.floor(total / 2));
      const secondHalf = results.slice(Math.floor(total / 2));

      function blockMeanRt(block) {
        const values = block.filter(row => row.error_type === "hit" && row.rt_ms !== "").map(row => Number(row.rt_ms));
        return mean(values);
      }

      return {
        completedTrials: total,
        targetCount: targets.length,
        nontargetCount: nontargets.length,
        hitCount: hits.length,
        omissionCount: omissions.length,
        commissionCount: commissions.length,
        correctRejectionCount: correctRejections.length,
        accuracy: total ? (hits.length + correctRejections.length) / total : 0,
        omissionRate: targets.length ? omissions.length / targets.length : 0,
        commissionRate: nontargets.length ? commissions.length / nontargets.length : 0,
        meanRtMs: mean(rtValues),
        rtSdMs: sd(rtValues),
        firstHalfMeanRtMs: blockMeanRt(firstHalf),
        secondHalfMeanRtMs: blockMeanRt(secondHalf)
      };
    }

    function calculateMinuteSummary() {
      const bins = {};
      results.forEach(row => {
        if (!bins[row.minute_bin]) bins[row.minute_bin] = [];
        bins[row.minute_bin].push(row);
      });

      return Object.keys(bins).map(minute => {
        const block = bins[minute];
        const targets = block.filter(row => row.is_target);
        const nontargets = block.filter(row => !row.is_target);
        const hits = block.filter(row => row.error_type === "hit");
        const omissions = block.filter(row => row.error_type === "omission");
        const commissions = block.filter(row => row.error_type === "commission");
        const correctRejections = block.filter(row => row.error_type === "correct_rejection");
        const rtValues = hits.map(row => Number(row.rt_ms)).filter(value => Number.isFinite(value));

        return {
          minute: minute,
          trial_count: block.length,
          target_count: targets.length,
          hit_count: hits.length,
          omission_count: omissions.length,
          commission_count: commissions.length,
          correct_rejection_count: correctRejections.length,
          mean_rt_ms: mean(rtValues),
          sd_rt_ms: sd(rtValues),
          accuracy: block.length ? (hits.length + correctRejections.length) / block.length : 0,
          omission_rate: targets.length ? omissions.length / targets.length : 0,
          commission_rate: nontargets.length ? commissions.length / nontargets.length : 0
        };
      });
    }

    function downloadCSV() {
      if (!results.length) return;

      const subjectId = subjectIdInput.value.trim() || "subject";
      const summaryData = calculateSummary();
      const minuteSummary = calculateMinuteSummary();
      const headers = ["trial", "minute_bin", "stimulus", "is_target", "response", "rt_ms", "correct", "error_type", "soa_ms", "paused", "trial_start_time"];
      const csvRows = [headers.join(",")];

      results.forEach(row => csvRows.push(headers.map(header => row[header]).join(",")));

      csvRows.push("");
      csvRows.push("summary_item,value");
      csvRows.push(`completed_trials,${summaryData.completedTrials}`);
      csvRows.push(`target_count,${summaryData.targetCount}`);
      csvRows.push(`nontarget_count,${summaryData.nontargetCount}`);
      csvRows.push(`hit_count,${summaryData.hitCount}`);
      csvRows.push(`omission_count,${summaryData.omissionCount}`);
      csvRows.push(`commission_count,${summaryData.commissionCount}`);
      csvRows.push(`correct_rejection_count,${summaryData.correctRejectionCount}`);
      csvRows.push(`mean_rt_ms,${summaryData.meanRtMs.toFixed(2)}`);
      csvRows.push(`rt_sd_ms,${summaryData.rtSdMs.toFixed(2)}`);
      csvRows.push(`first_half_mean_rt_ms,${summaryData.firstHalfMeanRtMs.toFixed(2)}`);
      csvRows.push(`second_half_mean_rt_ms,${summaryData.secondHalfMeanRtMs.toFixed(2)}`);
      csvRows.push(`accuracy,${(summaryData.accuracy * 100).toFixed(2)}%`);
      csvRows.push(`omission_rate,${(summaryData.omissionRate * 100).toFixed(2)}%`);
      csvRows.push(`commission_rate,${(summaryData.commissionRate * 100).toFixed(2)}%`);

      csvRows.push("");
      csvRows.push("minute_summary");
      csvRows.push("minute,trial_count,target_count,hit_count,omission_count,commission_count,correct_rejection_count,mean_rt_ms,sd_rt_ms,accuracy,omission_rate,commission_rate");

      minuteSummary.forEach(row => {
        csvRows.push([
          row.minute,
          row.trial_count,
          row.target_count,
          row.hit_count,
          row.omission_count,
          row.commission_count,
          row.correct_rejection_count,
          row.mean_rt_ms.toFixed(2),
          row.sd_rt_ms.toFixed(2),
          (row.accuracy * 100).toFixed(2) + "%",
          (row.omission_rate * 100).toFixed(2) + "%",
          (row.commission_rate * 100).toFixed(2) + "%"
        ].join(","));
      });

      const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${subjectId}_cptx_result.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    startBtn.addEventListener("click", startTask);

    document.addEventListener("keydown", event => {
      if (event.code === "Space") {
        if (running && !paused && stimulusActive && !responseCaptured) {
          event.preventDefault();
          responseCaptured = true;
          setStatus("已收到 SPACE。");
        }
        return;
      }

      if (event.key === "p" || event.key === "P") {
        if (running && !finished) {
          event.preventDefault();
          togglePause();
        }
        return;
      }

      if (event.key === "Escape") {
        if (running && !finished) {
          event.preventDefault();
          finishTask(true);
        }
      }
    });

    setBoxState("");
    taskDurationMs = Number(durationMinutesInput.value) * 60 * 1000;
    updateTimeLeft();
  </script>
</body>
</html>
